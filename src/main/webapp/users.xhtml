<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                template="/templates/layout.xhtml">

    <ui:define name="title">Users - World Cup Predictor</ui:define>

    <ui:define name="content">
        <div class="page-header">
            <h2>&#128100; Users</h2>
            <p>Manage participants in the World Cup prediction competition</p>
        </div>

        <h:panelGroup rendered="#{not empty userBean.successMessage}">
            <div class="message-success"><h:outputText value="#{userBean.successMessage}"/></div>
        </h:panelGroup>
        <h:panelGroup rendered="#{not empty userBean.errorMessage}">
            <div class="message-error"><h:outputText value="#{userBean.errorMessage}"/></div>
        </h:panelGroup>



        <h:panelGroup rendered="#{authBean.admin}">
            <div class="card">
                <h3>Create New User</h3>
                <h:form>
                    <div class="form-grid">
                        <div class="form-group">
                            <h:outputLabel for="username" value="Username"/>
                            <h:inputText id="username" value="#{userBean.username}" required="true"
                                         requiredMessage="Username is required" styleClass="form-input"/>
                        </div>
                    </div>
                    <h:commandButton value="Create User" action="#{userBean.createUser}" styleClass="btn btn-primary"/>
                </h:form>
            </div>
        </h:panelGroup>



        <div class="card">
            <h3>All Users (#{userBean.users.size()})</h3>
            <h:panelGroup rendered="#{empty userBean.users}">
                <p class="empty-state">No users yet. Create one above.</p>
            </h:panelGroup>



            <h:panelGroup rendered="#{not empty userBean.users}">
                <h:dataTable value="#{userBean.users}" var="user" styleClass="data-table">
                    <h:column>
                        <f:facet name="header">ID</f:facet>
                        <h:outputText value="#{user.id}"/>
                    </h:column>
                    <h:column>
                        <f:facet name="header">Username</f:facet>
                        <h:outputText value="#{user.username}"/>
                    </h:column>
                    <h:column>
                        <f:facet name="header">Total Points</f:facet>
                        <span class="points-badge"><h:outputText value="#{user.totalPoints}"/></span>
                    </h:column>
                    <h:column>
                        <f:facet name="header">Role</f:facet>
                        <h:outputText value="#{user.role}"/>
                    </h:column>
                    <h:column rendered="#{authBean.admin}">
                        <f:facet name="header">Actions</f:facet>
                        <h:form style="display:inline;">
                            <h:commandButton value="Promote" action="#{userBean.promoteToAdmin(user.id)}" styleClass="btn btn-warning btn-sm" rendered="#{not user.admin}"/>
                            <h:commandButton value="Demote" action="#{userBean.demoteFromAdmin(user.id)}" styleClass="btn btn-secondary btn-sm" rendered="#{user.admin}"/>
                        </h:form>
                    </h:column>
                </h:dataTable>
            </h:panelGroup>
        </div>
    </ui:define>
</ui:composition>
