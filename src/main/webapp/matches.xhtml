<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                template="/templates/layout.xhtml">

    <ui:define name="title">Matches - World Cup Predictor</ui:define>

    <ui:define name="content">

        <h:panelGroup id="messagesPanel" layout="block">
            <h:panelGroup rendered="#{not empty matchBean.successMessage}">
                <div class="message-success"><h:outputText value="#{matchBean.successMessage}"/></div>
            </h:panelGroup>
            <h:panelGroup rendered="#{not empty matchBean.errorMessage}">
                <div class="message-error"><h:outputText value="#{matchBean.errorMessage}"/></div>
            </h:panelGroup>
        </h:panelGroup>

        <!-- Page header + admin create button -->
        <div class="match-dash-header">
            <div class="page-header match-dash-title-block">
                <h2>&#9917; Matches</h2>
                <p>
                    <h:outputText rendered="#{authBean.admin}" value="Enter match results and manage fixtures."/>
                    <h:outputText rendered="#{not authBean.admin}" value="Live scores and upcoming fixtures."/>
                </p>
            </div>
            <h:form rendered="#{authBean.admin}">
                <h:commandButton value="+ Schedule Match"
                                 action="#{matchBean.toggleCreateForm}"
                                 styleClass="btn btn-primary match-dash-create-btn"/>
            </h:form>
        </div>

        <!-- Admin: create match form -->
        <h:panelGroup rendered="#{matchBean.showCreateForm and authBean.admin}">
            <div class="card match-dash-create-card">
                <h3>Schedule New Match</h3>
                <h:form>
                    <div class="form-grid">
                        <div class="form-group">
                            <h:outputLabel for="homeTeam" value="Home Team"/>
                            <h:selectOneMenu id="homeTeam" value="#{matchBean.homeTeam}"
                                             required="true" requiredMessage="Home team is required"
                                             styleClass="form-input">
                                <f:selectItem itemLabel="-- Select Home Team --" itemValue=""/>
                                <f:selectItems value="#{matchBean.teamNames}" var="t"
                                               itemValue="#{t}" itemLabel="#{t}"/>
                            </h:selectOneMenu>
                        </div>
                        <div class="form-group">
                            <h:outputLabel for="awayTeam" value="Away Team"/>
                            <h:selectOneMenu id="awayTeam" value="#{matchBean.awayTeam}"
                                             required="true" requiredMessage="Away team is required"
                                             styleClass="form-input">
                                <f:selectItem itemLabel="-- Select Away Team --" itemValue=""/>
                                <f:selectItems value="#{matchBean.teamNames}" var="t"
                                               itemValue="#{t}" itemLabel="#{t}"/>
                            </h:selectOneMenu>
                        </div>
                        <div class="form-group">
                            <h:outputLabel for="kickoffDate" value="Kickoff Date &amp; Time"/>
                            <h:inputText id="kickoffDate" value="#{matchBean.kickoffDate}"
                                         required="true" requiredMessage="Kickoff date is required"
                                         styleClass="form-input" type="datetime-local"/>
                        </div>
                    </div>
                    <h:commandButton value="Create Match"
                                     action="#{matchBean.createMatch}"
                                     styleClass="btn btn-primary"/>
                </h:form>
            </div>
        </h:panelGroup>

        <!-- Match list -->
        <div class="card match-dash-list-card">
            <h3>All Matches (<h:outputText value="#{matchBean.totalMatchCount}"/>)</h3>

            <h:panelGroup rendered="#{empty matchBean.matchRows}">
                <p class="empty-state">No matches scheduled yet.</p>
            </h:panelGroup>

            <div class="match-dash-list">
                <ui:repeat value="#{matchBean.matchRows}" var="row" varStatus="status">
                    <div class="match-dash-item">

                        <!-- Card top -->
                        <div class="match-dash-item-top">
                            <div>
                                <span class="match-stage">Match #<h:outputText value="#{status.index + 1}"/></span>
                                <span style="margin: 0 6px; color: var(--color-silver);">|</span>
                                <span class="match-kickoff">
                                    <h:outputText value="#{matchBean.formatMatchKickoff(row.match.kickoffDate)}"/>
                                </span>
                            </div>
                            <div class="match-dash-item-meta">
                                <h:form rendered="#{row.deletable and authBean.admin}" styleClass="match-dash-delete-form">
                                    <h:commandLink value="&#128465; Delete"
                                                   action="#{matchBean.deleteMatch(row.matchId)}"
                                                   styleClass="match-dash-delete-link"
                                                   onclick="return confirm('Delete this match?');"/>
                                </h:form>
                            </div>
                        </div>

                        <!-- FINISHED -->
                        <h:panelGroup rendered="#{row.finished}">
                            <h:panelGroup rendered="#{authBean.admin and row.match.canEditResult()}">
                                <h:form styleClass="match-dash-result-form">
                                    <div class="match-dash-item-body">
                                        <div class="pred-match-team" style="text-align:right;">
                                            <span class="match-team-flag"><h:outputText value="#{matchBean.getFlagForTeam(row.match.homeTeam)}" escape="false"/></span>
                                            <span class="match-team-name"><h:outputText value="#{row.match.homeTeam}"/></span>
                                        </div>
                                        <div class="match-dash-score-display" style="flex-direction:column; gap:6px;">
                                            <div style="display:flex; align-items:center; gap:8px;">
                                                <span class="match-dash-score-box match-score-winner">
                                                    <h:outputText value="#{row.match.homeScore}"/>
                                                </span>
                                                <span class="match-dash-score-dash">&#8211;</span>
                                                <span class="match-dash-score-box match-score-winner">
                                                    <h:outputText value="#{row.match.awayScore}"/>
                                                </span>
                                            </div>
                                            <div style="display:flex; align-items:center; gap:6px;">
                                                <input type="number" min="0"
                                                       name="hs_#{row.match.id}"
                                                       value="#{row.match.homeScore}"
                                                       class="match-dash-score-input" style="width:44px;"/>
                                                <span class="match-dash-vs">:</span>
                                                <input type="number" min="0"
                                                       name="as_#{row.match.id}"
                                                       value="#{row.match.awayScore}"
                                                       class="match-dash-score-input" style="width:44px;"/>
                                                <h:commandButton value="Update"
                                                                 action="#{matchBean.forceResultFromRow(row.match.id)}"
                                                                 styleClass="btn btn-sm btn-primary"/>
                                            </div>
                                        </div>
                                        <div class="pred-match-team" style="text-align:left;">
                                            <span class="match-team-flag"><h:outputText value="#{matchBean.getFlagForTeam(row.match.awayTeam)}" escape="false"/></span>
                                            <span class="match-team-name"><h:outputText value="#{row.match.awayTeam}"/></span>
                                        </div>
                                    </div>
                                </h:form>
                            </h:panelGroup>

                            <h:panelGroup rendered="#{not (authBean.admin and row.match.canEditResult())}">
                                <div class="match-dash-item-body">
                                    <div class="pred-match-team" style="text-align:right;">
                                        <span class="match-team-flag"><h:outputText value="#{matchBean.getFlagForTeam(row.match.homeTeam)}" escape="false"/></span>
                                        <span class="match-team-name"><h:outputText value="#{row.match.homeTeam}"/></span>
                                    </div>
                                    <div class="match-dash-score-display">
                                        <span class="match-dash-score-box #{row.match.homeScore gt row.match.awayScore ? 'match-score-winner' : ''}">
                                            <h:outputText value="#{row.match.homeScore}"/>
                                        </span>
                                        <span class="match-dash-score-dash">&#8211;</span>
                                        <span class="match-dash-score-box #{row.match.awayScore gt row.match.homeScore ? 'match-score-winner' : ''}">
                                            <h:outputText value="#{row.match.awayScore}"/>
                                        </span>
                                    </div>
                                    <div class="pred-match-team" style="text-align:left;">
                                        <span class="match-team-flag"><h:outputText value="#{matchBean.getFlagForTeam(row.match.awayTeam)}" escape="false"/></span>
                                        <span class="match-team-name"><h:outputText value="#{row.match.awayTeam}"/></span>
                                    </div>
                                </div>
                            </h:panelGroup>
                        </h:panelGroup>

                        <!-- NOT FINISHED -->
                        <h:panelGroup rendered="#{not row.finished}">

                            <h:panelGroup rendered="#{authBean.admin}">
                                <h:form styleClass="match-dash-result-form">
                                    <div class="match-dash-item-body">
                                        <div class="pred-match-team" style="text-align:right;">
                                            <span class="match-team-flag"><h:outputText value="#{matchBean.getFlagForTeam(row.match.homeTeam)}" escape="false"/></span>
                                            <span class="match-team-name"><h:outputText value="#{row.match.homeTeam}"/></span>
                                        </div>
                                        <div class="match-dash-score-entry">
                                            <input type="number" min="0" placeholder="0"
                                                   name="hs_#{row.match.id}" class="match-dash-score-input"/>
                                            <span class="match-dash-vs">:</span>
                                            <input type="number" min="0" placeholder="0"
                                                   name="as_#{row.match.id}" class="match-dash-score-input"/>
                                        </div>
                                        <div class="pred-match-team" style="text-align:left;">
                                            <span class="match-team-flag"><h:outputText value="#{matchBean.getFlagForTeam(row.match.awayTeam)}" escape="false"/></span>
                                            <span class="match-team-name"><h:outputText value="#{row.match.awayTeam}"/></span>
                                        </div>
                                    </div>
                                    <div class="match-dash-save-row">
                                        <h:commandButton value="Save Result"
                                                         action="#{matchBean.forceResultFromRow(row.match.id)}"
                                                         styleClass="btn btn-success btn-sm"/>
                                    </div>
                                </h:form>
                            </h:panelGroup>

                            <h:panelGroup rendered="#{not authBean.admin}">
                                <div class="match-dash-item-body">
                                    <div class="pred-match-team" style="text-align:right;">
                                        <span class="match-team-flag"><h:outputText value="#{matchBean.getFlagForTeam(row.match.homeTeam)}" escape="false"/></span>
                                        <span class="match-team-name"><h:outputText value="#{row.match.homeTeam}"/></span>
                                    </div>
                                    <div class="match-dash-score-display">
                                        <h:panelGroup rendered="#{row.match.hasStarted()}">
                                            <span class="match-live-badge">LIVE</span>
                                        </h:panelGroup>
                                        <h:panelGroup rendered="#{not row.match.hasStarted()}">
                                            <span class="match-upcoming-badge">Upcoming</span>
                                        </h:panelGroup>
                                    </div>
                                    <div class="pred-match-team" style="text-align:left;">
                                        <span class="match-team-flag"><h:outputText value="#{matchBean.getFlagForTeam(row.match.awayTeam)}" escape="false"/></span>
                                        <span class="match-team-name"><h:outputText value="#{row.match.awayTeam}"/></span>
                                    </div>
                                </div>
                            </h:panelGroup>

                        </h:panelGroup>

                        <!-- Status bar -->
                        <div class="#{matchBean.getStatusBarClass(row.match)}">
                            <h:outputText value="#{matchBean.getStatusBarText(row.match)}"/>
                        </div>

                    </div>
                </ui:repeat>
            </div>
        </div>

    </ui:define>
</ui:composition>
