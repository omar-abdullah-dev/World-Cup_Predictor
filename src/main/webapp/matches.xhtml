<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                template="/templates/layout.xhtml">

    <ui:define name="title">Matches - World Cup Predictor</ui:define>

    <ui:define name="content">

        <h:panelGroup id="messagesPanel" layout="block">
            <h:panelGroup rendered="#{not empty matchBean.successMessage}">
                <div class="message-success"><h:outputText value="#{matchBean.successMessage}"/></div>
            </h:panelGroup>
            <h:panelGroup rendered="#{not empty matchBean.errorMessage}">
                <div class="message-error"><h:outputText value="#{matchBean.errorMessage}"/></div>
            </h:panelGroup>
        </h:panelGroup>

        <div class="match-dash-header">
            <div class="page-header match-dash-title-block">
                <h2>&#9917; Matches Dashboard</h2>
                <p>Manage matches and enter results safely</p>
            </div>
            <h:form>
                <h:commandButton value="+ Create New Match"
                                 action="#{matchBean.toggleCreateForm}"
                                 styleClass="btn btn-primary match-dash-create-btn"
                                 rendered="#{authBean.admin}"/>
            </h:form>
        </div>

        <h:panelGroup rendered="#{matchBean.showCreateForm and authBean.admin}">
            <div class="card match-dash-create-card">
                <h3>Create New Match</h3>
                <h:form>
                    <div class="form-grid">
                        <div class="form-group">
                            <h:outputLabel for="homeTeam" value="Home Team"/>
                            <h:inputText id="homeTeam" value="#{matchBean.homeTeam}" required="true"
                                         requiredMessage="Home team is required"/>
                        </div>
                        <div class="form-group">
                            <h:outputLabel for="awayTeam" value="Away Team"/>
                            <h:inputText id="awayTeam" value="#{matchBean.awayTeam}" required="true"
                                         requiredMessage="Away team is required"/>
                        </div>
                        <div class="form-group">
                            <h:outputLabel for="kickoffDate" value="Kickoff Date &amp; Time"/>
                            <h:inputText id="kickoffDate" value="#{matchBean.kickoffDate}" required="true"
                                         requiredMessage="Kickoff date is required" type="datetime-local"/>
                        </div>
                    </div>
                    <h:commandButton value="Create Match" action="#{matchBean.createMatch}" styleClass="btn btn-primary"/>
                </h:form>
            </div>
        </h:panelGroup>

        <div class="card match-dash-list-card">
            <h3>All Matches (<h:outputText value="#{matchBean.totalMatchCount}"/>)</h3>

            <h:panelGroup rendered="#{empty matchBean.matchRows}">
                <p class="empty-state">No matches yet. Click "+ Create New Match" to add one.</p>
            </h:panelGroup>

            <div class="match-dash-list">
                <ui:repeat value="#{matchBean.matchRows}" var="row" varStatus="status">
                    <div class="match-dash-item">
                        <div class="match-dash-item-top">
                            <span class="match-stage">Match #<h:outputText value="#{status.index + 1}"/></span>
                            <div class="match-dash-item-meta">
                                <h:form rendered="#{row.deletable and authBean.admin}" styleClass="match-dash-delete-form">
                                    <h:commandLink value="&#128465; Delete"
                                                   action="#{matchBean.deleteMatch(row.matchId)}"
                                                   styleClass="match-dash-delete-link"
                                                   onclick="return confirm('Delete this match?');"/>
                                </h:form>
                                <span class="match-kickoff">
                                    <h:outputText value="#{matchBean.formatMatchKickoff(row.match.kickoffDate)}"/>
                                </span>
                            </div>
                        </div>

                        <h:panelGroup rendered="#{row.finished}">
                            <div class="match-dash-item-body">
                                <div class="pred-match-team">
                                    <div class="match-team-flag">
                                        <h:outputText value="#{matchBean.getFlagForTeam(row.match.homeTeam)}" escape="false"/>
                                    </div>
                                    <span class="match-team-name"><h:outputText value="#{row.match.homeTeam}"/></span>
                                </div>
                                <div class="match-dash-score-display">
                                    <span class="match-dash-score-box">
                                        <h:outputText value="#{row.match.homeScore}"/>
                                    </span>
                                    <span class="match-dash-vs">VS</span>
                                    <span class="match-dash-score-box">
                                        <h:outputText value="#{row.match.awayScore}"/>
                                    </span>
                                </div>
                                <div class="pred-match-team">
                                    <div class="match-team-flag">
                                        <h:outputText value="#{matchBean.getFlagForTeam(row.match.awayTeam)}" escape="false"/>
                                    </div>
                                    <span class="match-team-name"><h:outputText value="#{row.match.awayTeam}"/></span>
                                </div>
                            </div>
                        </h:panelGroup>

                        <h:panelGroup rendered="#{not row.finished and row.canRecordResult and authBean.admin}">
                            <h:form prependId="false" styleClass="match-dash-result-form">
                                <div class="match-dash-item-body">
                                    <div class="pred-match-team">
                                        <div class="match-team-flag">
                                            <h:outputText value="#{matchBean.getFlagForTeam(row.match.homeTeam)}" escape="false"/>
                                        </div>
                                        <span class="match-team-name"><h:outputText value="#{row.match.homeTeam}"/></span>
                                    </div>
                                    <div class="match-dash-score-entry">
                                        <h:inputText id="homeScore" value="#{row.homeScore}"
                                                     styleClass="match-dash-score-input">
                                            <f:convertNumber integerOnly="true"/>
                                        </h:inputText>
                                        <span class="match-dash-vs">VS</span>
                                        <h:inputText id="awayScore" value="#{row.awayScore}"
                                                     styleClass="match-dash-score-input">
                                            <f:convertNumber integerOnly="true"/>
                                        </h:inputText>
                                    </div>
                                    <div class="pred-match-team">
                                        <div class="match-team-flag">
                                            <h:outputText value="#{matchBean.getFlagForTeam(row.match.awayTeam)}" escape="false"/>
                                        </div>
                                        <span class="match-team-name"><h:outputText value="#{row.match.awayTeam}"/></span>
                                    </div>
                                </div>
                                <div class="match-dash-save-row">
                                    <h:commandButton value="Save Result"
                                                     action="#{matchBean.submitResultFromRow(row)}"
                                                     styleClass="btn btn-success btn-sm"/>
                                </div>
                            </h:form>
                        </h:panelGroup>

                        <h:panelGroup rendered="#{not row.finished and row.canRecordResult and not authBean.admin}">
                            <div class="match-dash-item-body match-dash-waiting">
                                <span class="match-dash-vs">Match in progress — awaiting result entry</span>
                            </div>
                        </h:panelGroup>

                        <h:panelGroup rendered="#{not row.finished and not row.canRecordResult and authBean.admin}">
                            <h:form prependId="false" styleClass="match-dash-result-form">
                                <div class="match-dash-item-body">
                                    <div class="pred-match-team">
                                        <span class="match-team-name"><h:outputText value="#{row.match.homeTeam}"/></span>
                                    </div>
                                    <div class="match-dash-score-entry">
                                        <h:inputText id="homeScoreForce" value="#{row.homeScore}"
                                                     styleClass="match-dash-score-input">
                                            <f:convertNumber integerOnly="true"/>
                                        </h:inputText>
                                        <span class="match-dash-vs">VS</span>
                                        <h:inputText id="awayScoreForce" value="#{row.awayScore}"
                                                     styleClass="match-dash-score-input">
                                            <f:convertNumber integerOnly="true"/>
                                        </h:inputText>
                                    </div>
                                    <div class="pred-match-team">
                                        <span class="match-team-name"><h:outputText value="#{row.match.awayTeam}"/></span>
                                    </div>
                                </div>
                                <div class="match-dash-save-row">
                                    <h:commandButton value="Force Record Result"
                                                     action="#{matchBean.forceResultFromRow(row)}"
                                                     styleClass="btn btn-warning btn-sm"
                                                     title="Record result bypassing time window (admin only)"/>
                                </div>
                            </h:form>
                        </h:panelGroup>

                        <h:panelGroup rendered="#{not row.finished and not row.canRecordResult and not authBean.admin}">
                            <div class="match-dash-item-body">
                                <div class="pred-match-team">
                                    <div class="team-initials-badge">
                                        <h:outputText value="#{matchBean.getTeamInitials(row.match.homeTeam)}"/>
                                    </div>
                                    <span class="match-team-name"><h:outputText value="#{row.match.homeTeam}"/></span>
                                </div>
                                <div class="match-dash-score-entry match-dash-score-placeholder">
                                    <span class="match-dash-score-box match-dash-score-dash">-</span>
                                    <span class="match-dash-vs">VS</span>
                                    <span class="match-dash-score-box match-dash-score-dash">-</span>
                                </div>
                                <div class="pred-match-team">
                                    <div class="team-initials-badge">
                                        <h:outputText value="#{matchBean.getTeamInitials(row.match.awayTeam)}"/>
                                    </div>
                                    <span class="match-team-name"><h:outputText value="#{row.match.awayTeam}"/></span>
                                </div>
                            </div>
                        </h:panelGroup>

                        <div class="#{matchBean.getStatusBarClass(row.match)}">
                            <h:outputText value="#{matchBean.getStatusBarText(row.match)}"/>
                        </div>
                    </div>
                </ui:repeat>
            </div>
        </div>

    </ui:define>
</ui:composition>
