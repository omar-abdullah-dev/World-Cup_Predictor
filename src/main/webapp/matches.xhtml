<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                template="/templates/layout.xhtml">

    <ui:define name="title">Matches - World Cup Predictor</ui:define>

    <ui:define name="content">
        <!-- Messages -->
        <h:panelGroup id="messagesPanel" layout="block">
            <h:panelGroup rendered="#{not empty matchBean.successMessage}">
                <div class="message-success">
                    <span>✓</span>
                    <h:outputText value="#{matchBean.successMessage}"/>
                </div>
            </h:panelGroup>
            <h:panelGroup rendered="#{not empty matchBean.errorMessage}">
                <div class="message-error">
                    <span>⚠️</span>
                    <h:outputText value="#{matchBean.errorMessage}"/>
                </div>
            </h:panelGroup>
        </h:panelGroup>

        <!-- Page Header & Action Controls -->
        <div class="match-dash-header">
            <div class="page-header match-dash-title-block">
                <h2>📅 Matches</h2>
                <p>
                    <h:outputText rendered="#{authBean.admin}" value="Admin Control: Enter final scores and manage match schedules."/>
                    <h:outputText rendered="#{not authBean.admin}" value="Browse upcoming fixtures, live scores, and tournament results."/>
                </p>
            </div>
            <h:form rendered="#{authBean.admin}">
                <h:commandButton value="➕ Schedule Match"
                                 action="#{matchBean.toggleCreateForm}"
                                 styleClass="btn btn-primary match-dash-create-btn" style="width:auto; display:inline-flex;"/>
            </h:form>
        </div>

        <!-- Schedule New Match Card (Admin Only) -->
        <h:panelGroup rendered="#{matchBean.showCreateForm and authBean.admin}">
            <div class="card match-dash-create-card">
                <h3>Schedule New Match</h3>
                <h:form>
                    <div class="form-grid">
                        <div class="form-group">
                            <h:outputLabel for="homeTeam" value="Home Team"/>
                            <h:selectOneMenu id="homeTeam" value="#{matchBean.homeTeam}"
                                             required="true" requiredMessage="Home team is required"
                                             styleClass="form-input">
                                <f:selectItem itemLabel="-- Select Home Team --" itemValue=""/>
                                <f:selectItems value="#{matchBean.teamNames}" var="t"
                                               itemValue="#{t}" itemLabel="#{t}"/>
                            </h:selectOneMenu>
                        </div>
                        <div class="form-group">
                            <h:outputLabel for="awayTeam" value="Away Team"/>
                            <h:selectOneMenu id="awayTeam" value="#{matchBean.awayTeam}"
                                             required="true" requiredMessage="Away team is required"
                                             styleClass="form-input">
                                <f:selectItem itemLabel="-- Select Away Team --" itemValue=""/>
                                <f:selectItems value="#{matchBean.teamNames}" var="t"
                                               itemValue="#{t}" itemLabel="#{t}"/>
                            </h:selectOneMenu>
                        </div>
                        <div class="form-group">
                            <h:outputLabel for="kickoffDate" value="Kickoff Date &amp; Time"/>
                            <h:inputText id="kickoffDate" value="#{matchBean.kickoffDate}"
                                         required="true" requiredMessage="Kickoff date is required"
                                         styleClass="form-input" type="datetime-local"/>
                        </div>
                    </div>
                    <div class="form-actions">
                        <h:commandButton value="Create Match"
                                         action="#{matchBean.createMatch}"
                                         styleClass="btn btn-primary"/>
                    </div>
                </h:form>
            </div>
        </h:panelGroup>

        <!-- Match List Directory -->
        <div class="card">
            <h3>📋 Scheduled Matches <span style="font-weight: normal; font-size: 0.85em; color: var(--text-muted); margin-left: var(--space-xs);">(Total: #{matchBean.totalMatchCount})</span></h3>

            <h:panelGroup rendered="#{empty matchBean.matchRows}">
                <div class="empty-state">
                    <p>No tournament fixtures have been scheduled yet.</p>
                </div>
            </h:panelGroup>

            <div class="match-dash-list">
                <ui:repeat value="#{matchBean.matchRows}" var="row" varStatus="status">
                    <div class="match-dash-item">

                        <!-- Card Top bar -->
                        <div class="match-dash-item-top">
                            <div>
                                <span class="match-stage">Fixture #<h:outputText value="#{row.match.id}"/></span>
                                <span style="margin: 0 var(--space-xs); color: var(--text-muted);">|</span>
                                <span class="match-kickoff">
                                    📅 <h:outputText value="#{matchBean.formatMatchKickoff(row.match.kickoffDate)}"/>
                                </span>
                            </div>
                            
                            <!-- Delete action -->
                            <div class="match-dash-item-meta">
                                <h:form rendered="#{row.deletable and authBean.admin}" styleClass="match-dash-delete-form" style="margin:0; padding:0;">
                                    <h:commandLink value="🗑️ Delete"
                                                   action="#{matchBean.deleteMatch(row.matchId)}"
                                                   styleClass="match-dash-delete-link"
                                                   onclick="return confirm('Delete this match scheduled fixture?');"/>
                                </h:form>
                            </div>
                        </div>

                        <!-- COMPLETED FIXTURES -->
                        <h:panelGroup rendered="#{row.finished}">
                            <h:panelGroup rendered="#{authBean.admin and row.match.canEditResult()}">
                                <!-- Admin: Result edit during grace period -->
                                <h:form styleClass="match-dash-result-form" style="margin:0; padding:0;">
                                    <div class="match-dash-item-body">
                                        <div class="pred-match-team" style="text-align:right;">
                                            <span class="match-team-name" style="margin-right:var(--space-sm); font-size:1.15em;"><h:outputText value="#{row.match.homeTeam}"/></span>
                                            <span class="team-initials-badge" style="display:inline-flex; vertical-align:middle; margin:0;">
                                                <h:outputText value="#{matchBean.getTeamInitials(row.match.homeTeam)}"/>
                                            </span>
                                        </div>
                                        <div class="match-dash-score-display" style="flex-direction:column; gap:var(--space-xs);">
                                            <div style="display:flex; align-items:center; gap:var(--space-xs);">
                                                <span class="match-dash-score-box match-score-winner">
                                                    <h:outputText value="#{row.match.homeScore}"/>
                                                </span>
                                                <span class="match-dash-score-dash">–</span>
                                                <span class="match-dash-score-box match-score-winner">
                                                    <h:outputText value="#{row.match.awayScore}"/>
                                                </span>
                                            </div>
                                            <div style="display:flex; align-items:center; gap:var(--space-2xs); background:rgba(255,255,255,0.03); border:1px solid var(--border-color); padding: 4px var(--space-xs); border-radius: var(--radius-sm);">
                                                <input type="number" min="0" name="hs_#{row.match.id}" value="#{row.match.homeScore}" class="match-dash-score-input"/>
                                                <span class="match-dash-vs">:</span>
                                                <input type="number" min="0" name="as_#{row.match.id}" value="#{row.match.awayScore}" class="match-dash-score-input"/>
                                                <h:commandButton value="Update" action="#{matchBean.forceResultFromRow(row.match.id)}" styleClass="btn btn-sm btn-primary" style="margin-left: 8px; width:auto; display:inline-flex;"/>
                                            </div>
                                        </div>
                                        <div class="pred-match-team" style="text-align:left;">
                                            <span class="team-initials-badge" style="display:inline-flex; vertical-align:middle; margin:0; margin-right:var(--space-sm);">
                                                <h:outputText value="#{matchBean.getTeamInitials(row.match.awayTeam)}"/>
                                            </span>
                                            <span class="match-team-name" style="font-size:1.15em;"><h:outputText value="#{row.match.awayTeam}"/></span>
                                        </div>
                                    </div>
                                </h:form>
                            </h:panelGroup>

                            <h:panelGroup rendered="#{not (authBean.admin and row.match.canEditResult())}">
                                <!-- User or Locked result display -->
                                <div class="match-dash-item-body">
                                    <div class="pred-match-team" style="text-align:right;">
                                        <span class="match-team-name" style="margin-right:var(--space-sm); font-size:1.15em;"><h:outputText value="#{row.match.homeTeam}"/></span>
                                        <span class="team-initials-badge" style="display:inline-flex; vertical-align:middle; margin:0;">
                                            <h:outputText value="#{matchBean.getTeamInitials(row.match.homeTeam)}"/>
                                        </span>
                                    </div>
                                    <div class="match-dash-score-display">
                                        <span class="match-dash-score-box #{row.match.homeScore gt row.match.awayScore ? 'match-score-winner' : ''}">
                                            <h:outputText value="#{row.match.homeScore}"/>
                                        </span>
                                        <span class="match-dash-score-dash">–</span>
                                        <span class="match-dash-score-box #{row.match.awayScore gt row.match.homeScore ? 'match-score-winner' : ''}">
                                            <h:outputText value="#{row.match.awayScore}"/>
                                        </span>
                                    </div>
                                    <div class="pred-match-team" style="text-align:left;">
                                        <span class="team-initials-badge" style="display:inline-flex; vertical-align:middle; margin:0; margin-right:var(--space-sm);">
                                            <h:outputText value="#{matchBean.getTeamInitials(row.match.awayTeam)}"/>
                                        </span>
                                        <span class="match-team-name" style="font-size:1.15em;"><h:outputText value="#{row.match.awayTeam}"/></span>
                                    </div>
                                </div>
                            </h:panelGroup>
                        </h:panelGroup>

                        <!-- UNCOMPLETED FIXTURES -->
                        <h:panelGroup rendered="#{not row.finished}">
                            <h:panelGroup rendered="#{authBean.admin}">
                                <!-- Admin: record new scores -->
                                <h:form styleClass="match-dash-result-form" style="margin:0; padding:0;">
                                    <div class="match-dash-item-body">
                                        <div class="pred-match-team" style="text-align:right;">
                                            <span class="match-team-name" style="margin-right:var(--space-sm); font-size:1.15em;"><h:outputText value="#{row.match.homeTeam}"/></span>
                                            <span class="team-initials-badge" style="display:inline-flex; vertical-align:middle; margin:0;">
                                                <h:outputText value="#{matchBean.getTeamInitials(row.match.homeTeam)}"/>
                                            </span>
                                        </div>
                                        <div class="match-dash-score-entry">
                                            <input type="number" min="0" placeholder="H" name="hs_#{row.match.id}" class="match-dash-score-input"/>
                                            <span class="match-dash-vs">:</span>
                                            <input type="number" min="0" placeholder="A" name="as_#{row.match.id}" class="match-dash-score-input"/>
                                        </div>
                                        <div class="pred-match-team" style="text-align:left;">
                                            <span class="team-initials-badge" style="display:inline-flex; vertical-align:middle; margin:0; margin-right:var(--space-sm);">
                                                <h:outputText value="#{matchBean.getTeamInitials(row.match.awayTeam)}"/>
                                            </span>
                                            <span class="match-team-name" style="font-size:1.15em;"><h:outputText value="#{row.match.awayTeam}"/></span>
                                        </div>
                                    </div>
                                    <div class="match-dash-save-row">
                                        <h:commandButton value="Save Score Result"
                                                         action="#{matchBean.forceResultFromRow(row.match.id)}"
                                                         styleClass="btn btn-success btn-sm" style="width:auto; display:inline-flex;"/>
                                    </div>
                                </h:form>
                            </h:panelGroup>

                            <h:panelGroup rendered="#{not authBean.admin}">
                                <!-- User: view statuses -->
                                <div class="match-dash-item-body">
                                    <div class="pred-match-team" style="text-align:right;">
                                        <span class="match-team-name" style="margin-right:var(--space-sm); font-size:1.15em;"><h:outputText value="#{row.match.homeTeam}"/></span>
                                        <span class="team-initials-badge" style="display:inline-flex; vertical-align:middle; margin:0;">
                                            <h:outputText value="#{matchBean.getTeamInitials(row.match.homeTeam)}"/>
                                        </span>
                                    </div>
                                    <div class="match-dash-score-display">
                                        <h:panelGroup rendered="#{row.match.hasStarted()}">
                                            <span class="match-live-badge">⚡ LIVE</span>
                                        </h:panelGroup>
                                        <h:panelGroup rendered="#{not row.match.hasStarted()}">
                                            <span class="match-upcoming-badge">Upcoming</span>
                                        </h:panelGroup>
                                    </div>
                                    <div class="pred-match-team" style="text-align:left;">
                                        <span class="team-initials-badge" style="display:inline-flex; vertical-align:middle; margin:0; margin-right:var(--space-sm);">
                                            <h:outputText value="#{matchBean.getTeamInitials(row.match.awayTeam)}"/>
                                        </span>
                                        <span class="match-team-name" style="font-size:1.15em;"><h:outputText value="#{row.match.awayTeam}"/></span>
                                    </div>
                                </div>
                            </h:panelGroup>
                        </h:panelGroup>

                        <!-- Bottom Status Bar -->
                        <div class="#{matchBean.getStatusBarClass(row.match)}">
                            <h:outputText value="#{matchBean.getStatusBarText(row.match)}"/>
                        </div>

                    </div>
                </ui:repeat>
            </div>
        </div>
    </ui:define>
</ui:composition>
