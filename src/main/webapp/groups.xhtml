<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                template="/templates/layout.xhtml">

    <ui:define name="title">Groups - World Cup Predictor</ui:define>

    <ui:define name="content">
        <!-- Page Header -->
        <div class="page-header">
            <h2>🌍 Tournament Pools</h2>
            <p>Select a group to analyze standings, check scheduled fixtures, and submit match predictions.</p>
        </div>

        <h:messages globalOnly="true" layout="list" styleClass="faces-messages"/>

        <!-- Pools cards grid -->
        <div class="cards-grid cards-grid-4-col">
            <ui:repeat value="#{groupsBean.groupNames}" var="group">
                <div class="group-card">
                    <h4><h:outputText value="#{group}"/></h4>
                    <ul class="group-card-teams">
                        <ui:repeat value="#{groupsBean.getTeamsByGroup(group)}" var="team">
                            <li>
                                <span>⚽ <h:outputText value="#{team.name}"/></span>
                                <span style="font-weight: 700; color: var(--text-muted); font-size: 0.85em;"><h:outputText value="#{team.shortCode}"/></span>
                            </li>
                        </ui:repeat>
                    </ul>
                    <h:link outcome="group-details" includeViewParams="true" styleClass="group-card-btn">
                        <f:param name="group" value="#{group}"/>
                        View Matches
                    </h:link>
                </div>
            </ui:repeat>
        </div>
    </ui:define>
</ui:composition>
