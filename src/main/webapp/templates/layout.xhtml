<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title><ui:insert name="title">World Cup Predictor</ui:insert></title>
    <h:outputStylesheet name="css/styles.css"/>
</h:head>
<h:body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <h1 class="app-title">
                    <span class="title-icon">&#9917;</span> World Cup Predictor
                </h1>
                <input type="checkbox" id="nav-toggle" class="nav-toggle"/>
                <label for="nav-toggle" class="nav-toggle-label" title="Toggle navigation">&#9776;</label>
                <nav class="app-nav">
                    <h:link outcome="index" value="Dashboard"
                            styleClass="nav-link#{navBean.isActive('index') ? ' active' : ''}"/>
                    <h:link outcome="groups" value="Groups"
                            styleClass="nav-link#{navBean.isActive('groups') ? ' active' : ''}"/>
                    <h:link outcome="matches" value="Matches"
                            styleClass="nav-link#{navBean.isActive('matches') ? ' active' : ''}"/>
                    <h:link outcome="predictions" value="Predictions"
                            styleClass="nav-link#{navBean.isActive('predictions') ? ' active' : ''}"/>
                    <h:link outcome="leaderboard" value="Leaderboard"
                            styleClass="nav-link#{navBean.isActive('leaderboard') ? ' active' : ''}"/>
                    <h:panelGroup rendered="#{authBean.admin}" layout="inline">
                        <h:link outcome="users" value="Users"
                                styleClass="nav-link#{navBean.isActive('users') ? ' active' : ''}"/>
                        <h:link outcome="admin-whitelist" value="Admin Whitelist"
                                styleClass="nav-link#{navBean.isActive('admin-whitelist') ? ' active' : ''}"/>
                        <h:link outcome="admin-rounds" value="Admin Rounds"
                                styleClass="nav-link#{navBean.isActive('admin-rounds') ? ' active' : ''}"/>
                        <h:link outcome="admin-groups" value="Admin Groups"
                                styleClass="nav-link#{navBean.isActive('admin-groups') ? ' active' : ''}"/>
                        <h:link outcome="admin-matches" value="Admin Matches"
                                styleClass="nav-link#{navBean.isActive('admin-matches') ? ' active' : ''}"/>
                        <h:link outcome="admin-audit" value="&#128274; Audit Log"
                                styleClass="nav-link#{navBean.isActive('admin-audit') ? ' active' : ''}"/>
                    </h:panelGroup>
                    <h:panelGroup rendered="#{authBean.loggedIn}" layout="inline">
                        <h:form styleClass="nav-logout-form" style="display:inline">
                            <h:commandLink value="Logout (#{authBean.currentUsername})"
                                          action="#{authBean.logout}"
                                          styleClass="nav-link nav-link-logout"/>
                        </h:form>
                    </h:panelGroup>
                    <h:panelGroup rendered="#{not authBean.loggedIn}" layout="inline">
                        <h:link outcome="login" value="Login" styleClass="nav-link"/>
                    </h:panelGroup>
                </nav>
            </div>
        </header>
        <main class="app-main">
            <ui:insert name="content"/>
        </main>
        <footer class="app-footer">
            <p>World Cup Predictor &#8212; Clean Architecture with Jakarta Faces (JSF)</p>
        </footer>
    </div>

    <!-- ═══════════════════════════════════════════════════════════════════
         Session Enforcement Script
         Runs on every page load for every logged-in user (user AND admin).

         LAYER 1 — Multi-browser detection (localStorage, shared across tabs)
           browserToken is issued by the server on every fresh login.
           localStorage persists across tabs in the same browser.
           When user logs in on Browser B, token changes → Browser A detects mismatch
           on next page load or within 15 s heartbeat → redirected to login.

         LAYER 2 — Multi-tab / single-tab enforcement (localStorage leader lock)
           Only ONE tab may hold the active-tab lock at a time.
           Lock key: wcp_tab_lock  →  value: { tabId, renewedAt }
           Lock TTL: 4 seconds (tab must renew every 2 s to keep ownership).

           On page load:
             a) If no lock exists → claim it (I am the first tab).
             b) If lock exists AND tabId == mine → I already own it, renew.
             c) If lock exists AND tabId != mine AND lock is fresh (< 4 s old)
                → CONFLICT: another tab is alive → I must leave NOW.
             d) If lock exists AND tabId != mine AND lock is STALE (≥ 4 s old)
                → The other tab closed without releasing → I can claim it.

         LAYER 3 — Server heartbeat every 15 s
           Polls /session-heartbeat to detect server-side displacement.
    ═══════════════════════════════════════════════════════════════════ -->
    <h:panelGroup rendered="#{authBean.loggedIn}" layout="block">
        <script type="text/javascript">
        //<![CDATA[
        (function() {

            // ── Constants ────────────────────────────────────────────────
            var SERVER_TOKEN  = '#{authBean.browserToken}';
            var LS_BROWSER    = 'wcp_browser_token';   // multi-browser token
            var LS_TAB_LOCK   = 'wcp_tab_lock';        // single-tab leader lock
            var LOCK_TTL_MS   = 4000;   // lock expires after 4 s of silence
            var RENEW_MS      = 2000;   // active tab renews every 2 s
            var HEARTBEAT_MS  = 15000;  // server-side poll every 15 s

            if (!SERVER_TOKEN || SERVER_TOKEN === 'null' || SERVER_TOKEN === '') return;

            // Generate a unique ID for THIS tab (survives page navigations within same tab
            // because we keep it in sessionStorage which is per-tab)
            var MY_TAB_ID = sessionStorage.getItem('wcp_tab_id');
            if (!MY_TAB_ID) {
                MY_TAB_ID = 'tab_' + Math.random().toString(36).substr(2, 9)
                                   + '_' + Date.now();
                sessionStorage.setItem('wcp_tab_id', MY_TAB_ID);
            }

            var loginUrl = window.location.origin
                + window.location.pathname.substring(
                    0, window.location.pathname.lastIndexOf('/') + 1)
                + 'login.xhtml';

            function doRedirect(reason) {
                // Stop the renew interval before leaving
                if (window._wcpRenewTimer) clearInterval(window._wcpRenewTimer);
                window.location.replace(loginUrl + '?reason=' + reason);
            }

            // ── LAYER 1: Multi-browser detection ────────────────────────
            var storedBrowserToken = localStorage.getItem(LS_BROWSER);
            if (!storedBrowserToken) {
                localStorage.setItem(LS_BROWSER, SERVER_TOKEN);
            } else if (storedBrowserToken !== SERVER_TOKEN) {
                // Server issued a new token → account logged in on another browser
                localStorage.setItem(LS_BROWSER, SERVER_TOKEN);
                sessionStorage.removeItem('wcp_tab_id');
                alert('Your account has been signed in from another location.\n' +
                      'You will be redirected to the login page.');
                doRedirect('session_conflict');
                return;
            }

            // ── LAYER 2: Single-tab leader lock ──────────────────────────

            function readLock() {
                try {
                    var raw = localStorage.getItem(LS_TAB_LOCK);
                    return raw ? JSON.parse(raw) : null;
                } catch(e) { return null; }
            }

            function writeLock() {
                localStorage.setItem(LS_TAB_LOCK,
                    JSON.stringify({ tabId: MY_TAB_ID, renewedAt: Date.now() }));
            }

            function releaseLock() {
                var lock = readLock();
                // Only release if I own it
                if (lock && lock.tabId === MY_TAB_ID) {
                    localStorage.removeItem(LS_TAB_LOCK);
                }
            }

            function isLockStale(lock) {
                return !lock || (Date.now() - lock.renewedAt) >= LOCK_TTL_MS;
            }

            function claimLock() {
                writeLock();
                // Start renewal heartbeat
                window._wcpRenewTimer = setInterval(function() {
                    var current = readLock();
                    if (current && current.tabId !== MY_TAB_ID) {
                        // Someone else claimed the lock while we were alive — evict them
                        // (this shouldn't happen normally, but guard against it)
                        clearInterval(window._wcpRenewTimer);
                        alert('Session conflict detected.\nThis tab will be redirected to the login page.');
                        doRedirect('tab_conflict');
                        return;
                    }
                    writeLock(); // renew
                }, RENEW_MS);
            }

            // Evaluate lock state on page load
            var lock = readLock();

            if (!lock || isLockStale(lock)) {
                // No active tab, or previous tab closed without releasing → claim
                claimLock();

            } else if (lock.tabId === MY_TAB_ID) {
                // I already own the lock (page navigation within same tab) → just renew
                claimLock();

            } else {
                // CONFLICT: another tab is alive and holds a fresh lock
                // I am the intruder — block immediately, no negotiation
                alert('This account is already open in another tab.\n' +
                      'Only one tab is allowed per session.\n' +
                      'This tab will be redirected to the login page.');
                doRedirect('tab_conflict');
                return;
            }

            // Release lock when tab closes or navigates away
            window.addEventListener('beforeunload', function() {
                releaseLock();
                if (window._wcpRenewTimer) clearInterval(window._wcpRenewTimer);
            });

            // Also listen for storage events so this tab knows if another tab
            // forcibly claimed the lock (e.g. after the TTL expired)
            window.addEventListener('storage', function(e) {
                if (e.key === LS_TAB_LOCK && e.newValue) {
                    try {
                        var newLock = JSON.parse(e.newValue);
                        if (newLock.tabId !== MY_TAB_ID) {
                            // A different tab just claimed the lock
                            if (window._wcpRenewTimer) clearInterval(window._wcpRenewTimer);
                            alert('Session conflict detected.\nThis tab will be redirected to the login page.');
                            doRedirect('tab_conflict');
                        }
                    } catch(e2) { /* ignore */ }
                }
                // Multi-browser: if browser token changes → we lost the session
                if (e.key === LS_BROWSER && e.newValue && e.newValue !== SERVER_TOKEN) {
                    if (window._wcpRenewTimer) clearInterval(window._wcpRenewTimer);
                    alert('Your account has been signed in from another location.\n' +
                          'You will be redirected to the login page.');
                    doRedirect('session_conflict');
                }
            });

            // ── LAYER 3: Server-side heartbeat ───────────────────────────
            setInterval(function() {
                try {
                    var xhr = new XMLHttpRequest();
                    xhr.open('GET', window.location.pathname.substring(
                        0, window.location.pathname.lastIndexOf('/') + 1)
                        + 'session-heartbeat', true);
                    xhr.onload = function() {
                        if (xhr.status === 200) {
                            try {
                                var data = JSON.parse(xhr.responseText);
                                if (data.status && data.status !== 'ok') {
                                    releaseLock();
                                    if (window._wcpRenewTimer) clearInterval(window._wcpRenewTimer);
                                    var msg = data.status === 'displaced'
                                        ? 'Your account was signed in from another location.'
                                        : 'Your session has expired.';
                                    alert(msg + '\nYou will be redirected to the login page.');
                                    doRedirect(data.status);
                                }
                            } catch(pe) { /* ignore parse errors */ }
                        }
                    };
                    xhr.send();
                } catch(e) { /* ignore network errors */ }
            }, HEARTBEAT_MS);

        })();
        //]]>
        </script>
    </h:panelGroup>
</h:body>
</html>
