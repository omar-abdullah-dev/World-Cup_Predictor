# ─────────────────────────────────────────────────────────────────────────────
# World Cup Predictor — Database Configuration
#
# Switch between Oracle and PostgreSQL by changing ONE property: db.vendor
#
#   db.vendor=postgres   → uses PostgreSQL (local / staging)
#   db.vendor=oracle     → uses Oracle Database (production / WebLogic)
#
# No code changes, no recompilation required.
# ─────────────────────────────────────────────────────────────────────────────

# ── Active vendor ─────────────────────────────────────────────────────────────
db.vendor=postgres

# ── PostgreSQL (local / staging) ──────────────────────────────────────────────
postgres.driver=org.postgresql.Driver
postgres.url=jdbc:postgresql://localhost:5432/worldclub
postgres.username=world_user
postgres.password=password

# ── Oracle (production / WebLogic) ────────────────────────────────────────────
# Uncomment and fill in when deploying to Oracle.
# On WebLogic the DataSource is provided via JNDI — the DriverManager fallback
# below is used only when no JNDI DataSource is available (local Oracle XE, etc.)
oracle.driver=oracle.jdbc.OracleDriver
oracle.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
oracle.username=world_user
oracle.password=password

# ─────────────────────────────────────────────────────────────────────────────
# HOW TO SWITCH
# ─────────────────────────────────────────────────────────────────────────────
# PostgreSQL  →  db.vendor=postgres
# Oracle      →  db.vendor=oracle
#
# For WildFly + PostgreSQL:
#   The JNDI DataSource "java:jboss/datasources/WorldCupDS" takes priority.
#   These DriverManager properties are the fallback for standalone / test execution.
#
# For WebLogic + Oracle:
#   Configure the DataSource in WebLogic Admin Console with JNDI name matching
#   JdbcHelper's @Resource lookup, or set db.vendor=oracle here for DriverManager mode.
# ─────────────────────────────────────────────────────────────────────────────

# ── WebLogic Deployment Notes ─────────────────────────────────────────────────
# On WebLogic 12c:
#   1. Open WebLogic Admin Console → Services → Data Sources → New
#   2. Set JNDI Name: jdbc/WorldCupDS
#   3. Set database type: Oracle (or PostgreSQL with third-party driver)
#   4. The weblogic.xml descriptor in WEB-INF/ maps this to the app's internal name
#
# The DriverManager fallback (database.properties) is used when:
#   - No app server is running (local testing)
#   - The JNDI DataSource is unavailable for any reason
#
# WebLogic JNDI name (customize to match your WebLogic DataSource name):
weblogic.jndi.name=jdbc/WorldCupDS
