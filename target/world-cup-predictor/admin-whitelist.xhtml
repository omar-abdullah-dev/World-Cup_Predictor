<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                template="/templates/layout.xhtml">

    <ui:define name="title">Admin Whitelist - World Cup Predictor</ui:define>

    <ui:define name="content">
        <div class="page-header">
            <h2>&#128203; Whitelist Manager</h2>
            <p>Authorize Active Directory users to access the World Cup Prediction platform</p>
        </div>

        <h:messages globalOnly="false" layout="list" styleClass="faces-messages" 
                    infoClass="message-success" errorClass="message-error"/>

        <!-- Add Whitelist Entry Card -->
        <div class="card">
            <h3>Add User to Whitelist</h3>
            <h:form id="add-whitelist-form" styleClass="form-grid">
                <div class="form-group">
                    <label for="adUsername">AD Username (sAMAccountName)</label>
                    <h:inputText id="adUsername" value="#{adminWhitelistBean.adUsername}" required="true" 
                                 requiredMessage="AD Username is required" styleClass="form-input"/>
                </div>
                <div class="form-group">
                    <label for="employeeName">Full Name</label>
                    <h:inputText id="employeeName" value="#{adminWhitelistBean.employeeName}" required="true"
                                 requiredMessage="Full Name is required" styleClass="form-input"/>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <h:inputText id="email" value="#{adminWhitelistBean.email}" required="true"
                                 requiredMessage="Email is required" styleClass="form-input">
                        <f:validateRegex pattern="^[\w-\.]+@([\w-]+\.)+[\w-]{2,4}$"/>
                    </h:inputText>
                </div>
                <div class="form-actions" style="display: flex; align-items: flex-end;">
                    <h:commandButton value="Authorize User" action="#{adminWhitelistBean.addEntry}" styleClass="btn btn-primary"/>
                </div>
            </h:form>
        </div>

        <!-- Whitelist Directory -->
        <div class="card">
            <h3>Whitelisted Users Directory</h3>
            <h:form id="whitelist-table-form">
                <h:panelGroup rendered="#{empty adminWhitelistBean.entries}">
                    <p class="form-hint">No users have been whitelisted yet.</p>
                </h:panelGroup>
                
                <h:panelGroup rendered="#{not empty adminWhitelistBean.entries}">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>AD Username</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <ui:repeat value="#{adminWhitelistBean.entries}" var="entry">
                                <tr>
                                    <td><strong><h:outputText value="#{entry.adUsername}"/></strong></td>
                                    <td><h:outputText value="#{entry.employeeName}"/></td>
                                    <td><h:outputText value="#{entry.email}"/></td>
                                    <td>
                                        <span class="status-badge #{entry.enabled ? 'status-finished' : 'status-closed'}">
                                            <h:outputText value="#{entry.enabled ? 'Enabled' : 'Disabled'}"/>
                                        </span>
                                    </td>
                                    <td>
                                        <h:commandLink value="#{entry.enabled ? 'Disable' : 'Enable'}" 
                                                       action="#{adminWhitelistBean.toggleStatus(entry.id, not entry.enabled)}"
                                                       styleClass="btn btn-sm #{entry.enabled ? 'btn-select' : 'btn-success'}"
                                                       style="margin-right: 8px; text-decoration: none; display: inline-block;">
                                            <f:ajax execute="@form" render="@form :add-whitelist-form"/>
                                        </h:commandLink>
                                        
                                        <h:commandLink value="Remove" 
                                                       action="#{adminWhitelistBean.removeEntry(entry.id)}"
                                                       onclick="return confirm('Are you sure you want to remove this user from the whitelist?');"
                                                       styleClass="btn btn-sm"
                                                       style="background: #dc2626; color: white; text-decoration: none; display: inline-block;">
                                            <f:ajax execute="@form" render="@form :add-whitelist-form"/>
                                        </h:commandLink>
                                    </td>
                                </tr>
                            </ui:repeat>
                        </tbody>
                    </table>
                </h:panelGroup>
            </h:form>
        </div>
    </ui:define>
</ui:composition>
