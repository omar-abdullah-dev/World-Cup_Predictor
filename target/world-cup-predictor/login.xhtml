<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <title>World Cup Predictor - Login</title>
    <link rel="stylesheet" type="text/css" href="#{request.contextPath}/resources/css/styles.css"/>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            margin: 0 0 10px 0;
            color: #333;
            font-size: 28px;
        }

        .login-header p {
            color: #666;
            margin: 0;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .login-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .message {
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
        }

        .message.error {
            background-color: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .message.success {
            background-color: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }

        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .login-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }
    </style>
</h:head>

<h:body>
    <div class="login-container">
        <div class="login-header">
            <h1>⚽ World Cup Predictor</h1>
            <p>Secure Login</p>
        </div>

        <h:form id="loginForm">
            <!-- Error message -->
            <h:panelGroup rendered="#{not empty authBean.errorMessage}">
                <div class="message error">
                    <h:outputText value="#{authBean.errorMessage}"/>
                </div>
            </h:panelGroup>

            <!-- Success message -->
            <h:panelGroup rendered="#{not empty authBean.successMessage}">
                <div class="message success">
                    <h:outputText value="#{authBean.successMessage}"/>
                </div>
            </h:panelGroup>

            <!-- Username field -->
            <div class="form-group">
                <h:outputLabel for="username" value="Username"/>
                <h:inputText id="username" 
                             value="#{authBean.username}" 
                             required="true"
                             placeholder="Enter your username"/>
            </div>

            <!-- Password field -->
            <div class="form-group">
                <h:outputLabel for="password" value="Password"/>
                <h:inputSecret id="password" 
                              value="#{authBean.password}" 
                              required="true"
                              placeholder="Enter your password"/>
            </div>

            <!-- Login button -->
            <h:commandButton value="🔓 Login" 
                            action="#{authBean.login()}"
                            styleClass="login-button"/>
        </h:form>

        <!-- Footer with registration link -->
        <div class="login-footer">
            <p>Don't have an account? <h:link value="Register here" outcome="/register"/></p>
            <p><small>Please wait for admin approval after registration</small></p>
        </div>
    </div>
</h:body>

</html>
