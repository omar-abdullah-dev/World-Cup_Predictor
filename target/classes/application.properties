# World Cup Predictor Application Configuration
# Database Configuration
app.database.url=jdbc:postgresql://localhost:5432/worldcup_db
app.database.username=postgres
app.database.password=postgres
app.database.driver=org.postgresql.Driver

# Hibernate Configuration
hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
hibernate.hbm2ddl.auto=update
hibernate.show_sql=false
hibernate.format_sql=true

# Security Configuration
security.jwt.secret=your-secret-key-change-this-in-production-minimum-256-bits
security.jwt.expiration=86400000
security.password.algorithm=PBKDF2
security.password.iterations=10000
security.cors.enabled=true
security.cors.allowed-origins=http://localhost:8080,http://localhost:8081
security.csrf.enabled=true

# Server Configuration
server.port=8080
server.context-path=/world-cup-predictor

# Application Configuration
app.name=World Cup Predictor
app.version=1.0.0
app.admin.default.username=admin
app.admin.default.password=admin123

# Logging Configuration
logging.level.com.worldcup=INFO
logging.level.org.hibernate=WARN
